<!DOCTYPE html>
<html lang="UTF-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="icon" href="https://www.svgrepo.com/show/335618/quiz-submissions.svg">
    <style>
        :root {
            --bg: #edf2ff;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: #d7deed;
            --accent: #2563eb;
            --accent-strong: #1d4ed8;
            --good: #16a34a;
            --bad: #ef4444;
        }
        body.dark-mode {
            --bg: #0a0f1f;
            --panel: #0c1326;
            --text: #f9fafb;
            --muted: #d7deed;
            --border: #2d3e5c;
            --accent: #8ac7ff;
            --accent-strong: #58a6ff;
            --good: #3ee07a;
            --bad: #ff8b8b;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 26px 18px 36px;
            background-color: var(--bg);
            background-image:
              radial-gradient(circle at 20% 20%, rgba(37,99,235,0.15), transparent 30%),
              radial-gradient(circle at 80% 0%, rgba(16,185,129,0.12), transparent 32%),
              linear-gradient(135deg, rgba(37,99,235,0.08), rgba(255,255,255,0)),
              repeating-linear-gradient(45deg, rgba(15,23,42,0.04), rgba(15,23,42,0.04) 4px, transparent 4px, transparent 12px);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s, background-image 0.3s;
            min-height: 100vh;
        }
        .game-container {
            max-width: 860px;
            margin: auto;
            padding: 18px 18px 16px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 12px 34px rgba(17,24,39,0.16);
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        .instructions {
            margin-bottom: 16px;
            color: var(--muted);
        }
        .words, .targets {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin-bottom: 8px;
            gap: 6px;
        }
        .section-block {
            padding: 8px 10px;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .words-section {
            background: rgba(37, 99, 235, 0.08);
        }
        .targets-section {
            background: rgba(16, 185, 129, 0.08);
        }
        body.dark-mode .words-section {
            background: rgba(138, 199, 255, 0.16);
        }
        body.dark-mode .targets-section {
            background: rgba(62, 224, 122, 0.16);
        }
        .section-divider {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 4px 0 8px;
        }
        .word, .target {
            padding: 8px;
            margin: 4px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: linear-gradient(150deg, rgba(37,99,235,0.18), rgba(255,255,255,0.9));
            cursor: pointer;
            user-select: none;
            text-align: center;
            width: var(--card-size, 120px);
            height: var(--card-size, 120px);
            transition: background-color 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
            box-shadow: 0 10px 24px rgba(37,99,235,0.25);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .word:active { cursor: grabbing; }
        .word.used {
            background: #e5e7eb;
            color: #7d8799;
            cursor: not-allowed;
            box-shadow: none;
        }
        .word.paired { color: #6f7a91; box-shadow: none; }
        .target.has-word { box-shadow: none; }
        body.dark-mode .word.used { background: #1c2536; color: #a0abc4; }
        body.dark-mode .word.paired {
            background: linear-gradient(150deg, rgba(138,199,255,0.4), rgba(10,15,31,0.9));
            color: rgba(255,255,255,0.75);
            box-shadow: none;
        }
        body.dark-mode .target.has-word { box-shadow: none; }
        body.dark-mode .word, body.dark-mode .target {
            background: linear-gradient(150deg, rgba(138,199,255,0.35), rgba(10,15,31,0.96));
            border-color: var(--border);
            color: var(--text);
        }
        .target {
            background: linear-gradient(140deg, rgba(37,99,235,0.12), rgba(255,255,255,0.92));
            border: 1.5px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .target .moved-word { font-weight: bold; }
        .target .original-translation { font-size: 0.9em; color: var(--muted); }
        .delete-btn {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--bad);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 14px;
            display: none;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.25);
        }
        .target.has-word:hover .delete-btn { display: block; }
        .target.correct { border-color: var(--good); }
        .target.incorrect { border-color: var(--bad); }
        .selected {
            background: linear-gradient(145deg, rgba(37,99,235,0.32), rgba(37,99,235,0.16));
            border-color: var(--accent);
            box-shadow: 0 12px 28px rgba(37,99,235,0.32);
        }
        body.dark-mode .selected {
            background: linear-gradient(145deg, rgba(124,195,255,0.46), rgba(78,166,255,0.22));
            color: #ffffff;
            text-shadow: 0 0 8px rgba(12, 19, 38, 0.7);
            box-shadow: 0 14px 32px rgba(78,166,255,0.35);
        }
        .buttons { margin-top: 10px; }
        .button {
            display: inline-block;
            margin: 5px;
            padding: 10px 15px;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(37,99,235,0.28);
            transition: background-color 0.2s, transform 0.15s, box-shadow 0.2s;
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(37,99,235,0.36);
        }
        body.dark-mode .button {
            background: linear-gradient(135deg, #7cb2ff, #4f8afc);
            color: #0b1021;
        }
        .speech-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin: 6px 0 2px;
            color: var(--muted);
            font-size: 0.95em;
        }
        .speech-controls label {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .speech-controls input[type="range"] {
            width: 130px;
            accent-color: var(--accent);
        }
        .result, .answers {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 18px rgba(255, 255, 255, 0.08);
        }
        .result { background: rgba(239,68,68,0.14); }
        .answers { background: rgba(22,163,74,0.14); }
        body.dark-mode .result {
            background: rgba(255, 139, 139, 0.4);
            border-color: rgba(255, 139, 139, 0.75);
        }
        body.dark-mode .answers {
            background: rgba(62,224,122,0.4);
            border-color: rgba(62,224,122,0.75);
            color: #ffffff;
        }
        .answers h4 {
            margin-top: 12px;
            margin-bottom: 6px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        .help-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background-color: var(--accent);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: background-color 0.2s;
        }
        .help-button:hover { background-color: var(--accent-strong); }
        .rules-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.45);
            z-index: 1001;
        }
        .rules-content {
            position: relative;
            background-color: var(--panel);
            margin: 20px auto 8px auto;
            padding: 20px;
            width: 80%;
            max-width: 820px;
            height: calc(100vh - 32px);
            max-height: calc(100vh - 32px);
            overflow-y: auto;
            border-radius: 12px;
            box-shadow: 0 10px 26px rgba(0,0,0,0.2);
        }
        body.dark-mode .rules-content {
            background-color: var(--panel);
            color: var(--text);
        }
    </style>
</head>
<body>
    <button class="help-button" onclick="toggleRules()">?</button>
    <div class="rules-modal" id="rulesModal" onclick="closeRules(event)">
        <div class="rules-content">
            <iframe src="規則.html" style="width: 100%; height: 100%; border: none;"></iframe>
        </div>
    </div>
    <div class="game-container">
        <h1 id="title"></h1>
        <p class="instructions" id="instructions"></p>
        <div class="section-block words-section">
            <div class="words"></div>
        </div>
        <hr class="section-divider">
        <div class="section-block targets-section">
            <div class="targets"></div>
        </div>
        <div class="buttons">
            <button class="button" onclick="toggleDarkMode()" id="dark-mode-btn"></button>
            <button class="button" onclick="undoLastAction()" id="undo-btn"></button>
            <button class="button" id="submit-btn" onclick="checkAnswers()"></button>
            <button id="wordbank-btn" class="button" onclick="openWordBank()"></button>
            <button class="button" onclick="switchLanguage('zh')">中文</button>
            <button class="button" onclick="switchLanguage('en')">English</button>
            <button id="restart-btn" class="button" onclick="restartGame()" style="display:none;"></button>
        </div>
        <div class="speech-controls">
            <label><span id="speechRateText"></span>
                <input type="range" id="speechRate" min="0.5" max="2" step="0.05">
                <span id="speechRateLabel"></span>
            </label>
            <label><span id="speechVolumeText"></span>
                <input type="range" id="speechVolume" min="0" max="1" step="0.05">
                <span id="speechVolumeLabel"></span>
            </label>
            <label><span id="speechVoiceText"></span>
                <select id="speechVoice"></select>
            </label>
        </div>
        <div id="result" class="result" style="display:none;"></div>
        <div id="answers" class="answers" style="display:none;"></div>
    </div>

    <script>
        let currentLanguage = localStorage.getItem('currentLanguage') || 'zh';

        const translations = {
          zh: {
            title: "單字配對",
            instructions: "點擊或拖放單詞到對應的意思或翻譯區域。",
            submit: "提交",
            undo: "撤銷",
            darkMode: "切換深色/淡色模式",
            wordBank: "查看單字庫",
            restart: "再玩一次",
            correct: "答對",
            incorrect: "答錯",
            correctAnswersTitle: "答案解析：",
            incorrectlyAnsweredTitle: "回答錯誤：",
            unansweredTitle: "未作答：",
            correctShouldBe: "應為",
            noWordsToTest: "沒有單字可供測驗。",
            promptToAddWords: "請點擊「查看單字庫」新增單字。",
            unselected: "未選擇",
            confirmSubmitPartial: "還有 {count} 個空格未填寫，確定要提交嗎？",
            speechRate: "語速",
            speechVolume: "音量",
            speechVoice: "語音來源"
          },
          en: {
            title: "Word Matching Game",
            instructions: "Click or drag the words to match their meanings or translations.",
            submit: "Submit",
            undo: "Undo",
            darkMode: "Toggle Dark/Light Mode",
            wordBank: "View Word Bank",
            restart: "Play Again",
            correct: "correct",
            incorrect: "incorrect",
            correctAnswersTitle: "Correct Answers:",
            incorrectlyAnsweredTitle: "Incorrectly Answered:",
            unansweredTitle: "Unanswered:",
            correctShouldBe: "Correct is",
            noWordsToTest: "No words available for testing.",
            promptToAddWords: "Please click \"View Word Bank\" to add words.",
            unselected: "Unselected",
            confirmSubmitPartial: "There are {count} empty spaces. Are you sure you want to submit?",
            speechRate: "Speech rate",
            speechVolume: "Volume",
            speechVoice: "Voice provider"
          }
        };

        const WORD_META_KEY = 'wordMeta';
        const WORD_STATS_KEY = 'wordStats';
        const LEGACY_WORDS_KEY = 'words';

        let isFirstRound = true;

        const defaultGameSettings = {
            wordsPerRound: 10,
            enableSmartSystem: true,
            enableTimeSystem: false,
            enableScoreSystem: true,
            readParentheses: true,
            questionCount: 10,
            answerCount: 10,
            syncCounts: true,
            languageOverrideEnabled: false,
            speechLanguage: 'auto'
        };
        function loadGameSettings() {
            try {
                const saved = JSON.parse(localStorage.getItem('wordGameSettings'));
                if (saved && typeof saved === 'object') {
                    const merged = { ...defaultGameSettings, ...saved };
                    if (merged.enableSmartSystem === undefined && saved.enableWeightSystem !== undefined) {
                        merged.enableSmartSystem = Boolean(saved.enableWeightSystem);
                        merged.enableScoreSystem = Boolean(saved.enableWeightSystem);
                        merged.enableTimeSystem = false;
                    }
                    return merged;
                }
            } catch (e) {}
            return { ...defaultGameSettings };
        }
        let settings = loadGameSettings();

        let wordsTestedInSession = new Set();
        let totalUniqueWords = 0;

        let currentRoundWords = [];
        let selectedWord = null;
        const actionHistory = [];
        let statsMap = {};
        let lastMatchAt = null;
        let lastActivityAt = Date.now();
        let timeTrackingInvalid = false;
        let pendingTimeStats = {};

        function normalizeWordsList(rawWords) {
            return (rawWords || []).map(wordItem => {
                return {
                    word: wordItem.word,
                    translation: wordItem.translation,
                    wrongCount: wordItem.wrongCount !== undefined ? wordItem.wrongCount : 0,
                    correctCount: wordItem.correctCount !== undefined ? wordItem.correctCount : 0,
                    hasBeenTested: wordItem.hasBeenTested !== undefined ? wordItem.hasBeenTested : false,
                    streakCount: wordItem.streakCount !== undefined ? wordItem.streakCount : 0,
                    score: wordItem.score !== undefined ? wordItem.score : 0,
                    timeUnits: wordItem.timeUnits !== undefined ? wordItem.timeUnits : 0,
                    timeSamples: wordItem.timeSamples !== undefined ? wordItem.timeSamples : 0,
                    addedOrder: wordItem.addedOrder !== undefined ? wordItem.addedOrder : Date.now()
                };
            });
        }

        function mergeMetaAndStats(metaList, statsObj) {
            const stats = statsObj || {};
            return (metaList || []).map(m => {
                const s = stats[m.word] || {};
                return {
                    word: m.word,
                    translation: m.translation,
                    addedOrder: m.addedOrder !== undefined ? m.addedOrder : Date.now(),
                    wrongCount: s.wrongCount || 0,
                    correctCount: s.correctCount || 0,
                    hasBeenTested: s.hasBeenTested || false,
                    streakCount: s.streakCount || 0,
                    score: s.score || 0,
                    timeUnits: s.timeUnits || 0,
                    timeSamples: s.timeSamples || 0
                };
            });
        }

        function splitWordsToMetaStats(wordsArray) {
            const meta = [];
            const stats = {};
            (wordsArray || []).forEach(w => {
                meta.push({
                    word: w.word,
                    translation: w.translation,
                    addedOrder: w.addedOrder !== undefined ? w.addedOrder : Date.now()
                });
                stats[w.word] = {
                    wrongCount: w.wrongCount || 0,
                    correctCount: w.correctCount || 0,
                    hasBeenTested: w.hasBeenTested || false,
                    streakCount: w.streakCount || 0,
                    score: w.score || 0,
                    timeUnits: w.timeUnits || 0,
                    timeSamples: w.timeSamples || 0
                };
            });
            return { meta, stats };
        }

        function readMetaStatsWithMigration() {
            let meta = JSON.parse(localStorage.getItem(WORD_META_KEY) || 'null');
            let stats = JSON.parse(localStorage.getItem(WORD_STATS_KEY) || 'null');
            if (!meta || !stats) {
                const legacy = normalizeWordsList(JSON.parse(localStorage.getItem(LEGACY_WORDS_KEY) || 'null') || []);
                const split = splitWordsToMetaStats(legacy);
                meta = split.meta;
                stats = split.stats;
                localStorage.setItem(WORD_META_KEY, JSON.stringify(meta));
                localStorage.setItem(WORD_STATS_KEY, JSON.stringify(stats));
            }
            return { meta: meta || [], stats: stats || {} };
        }

        function saveStats(stats) {
            localStorage.setItem(WORD_STATS_KEY, JSON.stringify(stats || {}));
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function clampNumber(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function updateCardSizeByAverage(wordsList, targetsList) {
            const lengths = [];
            (wordsList || []).forEach(w => {
                if (w && w.word) lengths.push(w.word.toString().length);
            });
            (targetsList || []).forEach(t => {
                if (t && t.translation) lengths.push(t.translation.toString().length);
            });
            if (lengths.length === 0) return;
            const avg = lengths.reduce((sum, n) => sum + n, 0) / lengths.length;
            const size = clampNumber(Math.round(64 + avg * 4), 80, 140);
            document.documentElement.style.setProperty('--card-size', `${size}px`);
        }

        function calculateWordScore(wordObj, isCorrect) {
            let points = 0;

            if (isCorrect) {
                const streakReward = wordObj.streakCount > 1 ? (wordObj.streakCount - 1) * 10 : 0;
                points = 10 + streakReward;
            } else {
                points = -10;
            }

            return points;
        }

        function recordActivity() {
            const now = Date.now();
            if (lastActivityAt && now - lastActivityAt > 180000) {
                timeTrackingInvalid = true;
            }
            lastActivityAt = now;
        }

        function addPendingTime(word, units) {
            if (!pendingTimeStats[word]) {
                pendingTimeStats[word] = { timeUnits: 0, timeSamples: 0 };
            }
            pendingTimeStats[word].timeUnits += units;
            pendingTimeStats[word].timeSamples += 1;
        }

        function recordMatchTime(word) {
            if (!word || timeTrackingInvalid) return;
            const now = Date.now();
            if (lastMatchAt) {
                const delta = now - lastMatchAt;
                const units = Math.max(1, Math.ceil(delta / 10000));
                addPendingTime(word, units);
            }
            lastMatchAt = now;
        }

        function markUnfamiliar(word) {
            if (!word) return;
            if (!statsMap[word]) statsMap[word] = {};
            statsMap[word].wrongCount = (statsMap[word].wrongCount || 0) + 1;
            statsMap[word].streakCount = 0;
            const wordObj = currentRoundWords.find(w => w.word === word);
            if (wordObj) {
                wordObj.wrongCount = statsMap[word].wrongCount;
                wordObj.streakCount = 0;
            }
            saveStats(statsMap);
        }

        function markUnfamiliarForTarget(targetElement, oldWord) {
            if (!targetElement || !oldWord) return;
            const translation = targetElement.dataset.translation;
            const correctWord = currentRoundWords.find(w => w.translation === translation)?.word;
            // 舊字一定記一次
            markUnfamiliar(oldWord);
            // 若舊字不是正確解，再記一次正確解（1~2 次）
            if (correctWord && correctWord !== oldWord) {
                markUnfamiliar(correctWord);
            }
        }

        function createGame() {
            const { meta, stats } = readMetaStatsWithMigration();
            statsMap = stats || {};
            let words = mergeMetaAndStats(meta, statsMap);

            const wordContainer = document.querySelector('.words');
            const targetContainer = document.querySelector('.targets');
            const submitButton = document.getElementById('submit-btn');

            wordContainer.innerHTML = "";
            targetContainer.innerHTML = "";
            selectedWord = null;
            actionHistory.length = 0;
            lastMatchAt = null;
            timeTrackingInvalid = false;
            pendingTimeStats = {};
            lastActivityAt = Date.now();

            submitButton.disabled = false;

            totalUniqueWords = new Set(words.map(w => w.word)).size;

            if (words.length === 0) {
                wordContainer.innerHTML = `
                    <p>${translations[currentLanguage].noWordsToTest}</p>
                    <p>${translations[currentLanguage].promptToAddWords}</p>
                `;
                wordContainer.style.display = 'block';
                wordContainer.style.textAlign = 'center';
                document.getElementById('submit-btn').style.display = 'none';
                document.getElementById('restart-btn').style.display = 'none';
                document.getElementById('result').style.display = 'none';
                document.getElementById('answers').style.display = 'none';
                return;
            } else {
                wordContainer.style.display = 'flex';
                wordContainer.style.textAlign = 'initial';
                document.getElementById('submit-btn').style.display = 'inline-block';
            }

            const requestedWordCount = settings.syncCounts ? settings.wordsPerRound : settings.questionCount;
            const requestedAnswerCount = settings.syncCounts ? settings.wordsPerRound : settings.answerCount;
            const numWordsForRound = Math.min(requestedWordCount, words.length);
            const numAnswerForRound = Math.max(numWordsForRound, Math.min(requestedAnswerCount, words.length));
            let wordsToChoose = [...words];

            wordsTestedInSession = new Set(words.filter(w => w.hasBeenTested).map(w => w.word));

            const getAvgTimeUnit = (w) => {
                const s = statsMap[w.word] || {};
                const samples = s.timeSamples || 0;
                if (samples <= 0) return 0;
                return (s.timeUnits || 0) / samples;
            };

            if (!settings.enableSmartSystem) {
                // 沒有智能出題時，隨機選取單字
                currentRoundWords = shuffle(wordsToChoose).slice(0, numWordsForRound);
            } else {
                const picks = [];
                const pickSet = new Set();

                if (settings.enableTimeSystem) {
                    const byTime = [...wordsToChoose].sort((a, b) => getAvgTimeUnit(b) - getAvgTimeUnit(a));
                    byTime.slice(0, numWordsForRound).forEach(w => {
                        if (!pickSet.has(w.word)) {
                            pickSet.add(w.word);
                            picks.push(w);
                        }
                    });
                }
                if (settings.enableScoreSystem) {
                    const byScore = [...wordsToChoose].sort((a, b) => (a.score || 0) - (b.score || 0));
                    byScore.slice(0, numWordsForRound).forEach(w => {
                        if (!pickSet.has(w.word)) {
                            pickSet.add(w.word);
                            picks.push(w);
                        }
                    });
                }

                if (picks.length === 0) {
                    currentRoundWords = shuffle(wordsToChoose).slice(0, numWordsForRound);
                } else {
                    const shuffledPicks = shuffle(picks);
                    currentRoundWords = shuffledPicks.slice(0, numWordsForRound);
                }
            }

            if (currentRoundWords.length < numWordsForRound && wordsToChoose.length > currentRoundWords.length) {
                const alreadySelectedWords = new Set(currentRoundWords.map(w => w.word));
                const availableWords = wordsToChoose.filter(w => !alreadySelectedWords.has(w.word));
                const wordsToFill = shuffle(availableWords).slice(0, numWordsForRound - currentRoundWords.length);
                currentRoundWords = shuffle([...currentRoundWords, ...wordsToFill]);
            }

            if (currentRoundWords.length === 0 && words.length > 0) {
                 currentRoundWords = shuffle([...words]).slice(0, numWordsForRound);
            }

            currentRoundWords.forEach(wordObj => {
                const originalWordIndex = words.findIndex(w => w.word === wordObj.word);
                if (originalWordIndex !== -1) {
                    words[originalWordIndex].hasBeenTested = true;
                    wordsTestedInSession.add(wordObj.word);
                    if (!statsMap[wordObj.word]) statsMap[wordObj.word] = {};
                    statsMap[wordObj.word].hasBeenTested = true;
                }
            });
            saveStats(statsMap);

            let answerPool = [...currentRoundWords];
            if (numAnswerForRound > currentRoundWords.length) {
                const selectedSet = new Set(currentRoundWords.map(w => w.word));
                const extraPool = wordsToChoose.filter(w => !selectedSet.has(w.word));
                const extrasNeeded = numAnswerForRound - currentRoundWords.length;
                const extras = shuffle(extraPool).slice(0, extrasNeeded);
                answerPool = [...answerPool, ...extras];
            } else if (numAnswerForRound < currentRoundWords.length) {
                answerPool = shuffle([...currentRoundWords]).slice(0, numAnswerForRound);
            }
            answerPool = shuffle(answerPool);
            updateCardSizeByAverage(currentRoundWords, answerPool);
            const shuffledWords = shuffle([...currentRoundWords]);
            const shuffledTranslations = shuffle([...answerPool]);
            const requiredTranslations = new Set(currentRoundWords.map(w => w.translation));


            shuffledWords.forEach(item => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word';
                wordDiv.draggable = true;
                wordDiv.textContent = item.word;
                wordDiv.dataset.word = item.word;

                wordDiv.addEventListener('dragstart', dragStart);
                wordDiv.addEventListener('dragend', dragEnd);
                wordDiv.addEventListener('click', handleWordClick);

                wordContainer.appendChild(wordDiv);
            });

            shuffledTranslations.forEach(item => {
                const targetDiv = document.createElement('div');
                targetDiv.className = 'target';
                targetDiv.dataset.translation = item.translation;
                targetDiv.dataset.required = requiredTranslations.has(item.translation) ? 'true' : 'false';
                targetDiv.innerHTML = `
                    <div class="moved-word"></div>
                    <div class="original-translation">${item.translation}</div>
                    <button class="delete-btn" onclick="deleteWord(event, this)">×</button>
                `;
                targetDiv.addEventListener('dragover', allowDrop);
            targetDiv.addEventListener('drop', drop);
            targetDiv.addEventListener('click', () => matchWord(targetDiv));

                targetContainer.appendChild(targetDiv);
            });

            document.getElementById('undo-btn').style.display = 'inline-block';
            document.getElementById('dark-mode-btn').style.display = 'inline-block';
            document.getElementById('wordbank-btn').style.display = 'inline-block';
            document.querySelector('button[onclick="switchLanguage(\'zh\')"]').style.display = (currentLanguage === 'zh' ? 'none' : 'inline-block');
            document.querySelector('button[onclick="switchLanguage(\'en\')"]').style.display = (currentLanguage === 'en' ? 'none' : 'inline-block');

            document.getElementById('restart-btn').style.display = 'none';
        }
        function switchLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('currentLanguage', lang);
            const t = translations[currentLanguage];

            document.title = t.title;
            document.getElementById('title').textContent = t.title;
            document.getElementById('instructions').textContent = t.instructions;
            document.getElementById('submit-btn').textContent = t.submit;
            document.getElementById('undo-btn').textContent = t.undo;
            document.getElementById('dark-mode-btn').textContent = t.darkMode;
            document.getElementById('wordbank-btn').textContent = t.wordBank;
            document.getElementById('restart-btn').textContent = t.restart;
            const rateText = document.getElementById('speechRateText');
            const volText = document.getElementById('speechVolumeText');
            const voiceText = document.getElementById('speechVoiceText');
            if (rateText) rateText.textContent = t.speechRate;
            if (volText) volText.textContent = t.speechVolume;
            if (voiceText) voiceText.textContent = t.speechVoice;

            document.querySelector('button[onclick="switchLanguage(\'zh\')"]').style.display = (lang === 'zh' ? 'none' : 'inline-block');
            document.querySelector('button[onclick="switchLanguage(\'en\')"]').style.display = (lang === 'en' ? 'none' : 'inline-block');

            createGame();

            const rulesIframe = document.getElementById('rulesModal').querySelector('iframe');
            if (rulesIframe && rulesIframe.contentWindow) {
                rulesIframe.contentWindow.postMessage({ type: 'languageChange', lang: lang }, '*');
            }
        }

        function allowDrop(e) {
            e.preventDefault();
        }

        function dragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.dataset.word);
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function drop(e) {
            e.preventDefault();
            const word = e.dataTransfer.getData('text/plain');
            handleAction(e.target, word);
        }

        const defaultSpeechSettings = { rate: 1, volume: 1, voiceVendor: 'google' };
        let speechSettings = (() => {
            try {
                const saved = JSON.parse(localStorage.getItem('speechSettings'));
                if (saved && typeof saved === 'object') return { ...defaultSpeechSettings, ...saved };
            } catch (e) {}
            return { ...defaultSpeechSettings };
        })();

        function clamp(val, min, max) {
            return Math.min(max, Math.max(min, val));
        }

        function pickVoiceForLang(voices, targetLang) {
            if (!targetLang) return null;
            const exact = voices.find(v => v.lang === targetLang);
            if (exact) return exact;
            const base = targetLang.split('-')[0];
            return voices.find(v => v.lang && v.lang.startsWith(base)) || null;
        }

        function getSelectedVoice(targetLang) {
            if (!window.speechSynthesis) return null;
            const voices = window.speechSynthesis.getVoices();
            if (!voices || voices.length === 0) return null;
            const vendor = (speechSettings.voiceVendor || 'google').toLowerCase();
            const vendorRegex = vendor === 'microsoft' ? /Microsoft/i : /Google/i;
            const vendorVoices = voices.filter(v => vendorRegex.test(v.name));
            let selected = pickVoiceForLang(vendorVoices, targetLang) || vendorVoices[0] || null;
            if (!selected) {
                selected = pickVoiceForLang(voices, targetLang) || voices[0] || null;
            }
            return selected;
        }

        function speakWord(text) {
            if (!text || !window.speechSynthesis) return;
            settings = loadGameSettings();
            const synth = window.speechSynthesis;
            if (synth.speaking) synth.cancel();
            let speakText = text;
            if (settings && settings.readParentheses === false) {
                speakText = speakText.replace(/\s*\([^)]*\)\s*/g, ' ').trim();
                speakText = speakText.replace(/\s{2,}/g, ' ');
            }
            const utter = new SpeechSynthesisUtterance(speakText);
            const hasLatin = /[a-zA-Z]/.test(text);
            const hasDigit = /[0-9]/.test(text);
            let targetLang = (hasLatin || (hasDigit && currentLanguage === 'en')) ? 'en-US' : 'zh-TW';
            if (settings && settings.languageOverrideEnabled) {
                const chosenLang = settings.speechLanguage && settings.speechLanguage !== 'auto' ? settings.speechLanguage : null;
                if (chosenLang) targetLang = chosenLang;
            }
            utter.lang = targetLang;
            const selectedVoice = getSelectedVoice(targetLang);
            if (selectedVoice) utter.voice = selectedVoice;
            utter.rate = clamp(speechSettings.rate ?? defaultSpeechSettings.rate, 0.5, 2);
            utter.volume = clamp(speechSettings.volume ?? defaultSpeechSettings.volume, 0, 1);
            utter.pitch = 1;
            synth.speak(utter);
        }

        function handleWordClick(event) {
            const wordElement = event.target;
            // 檢查單字是否已被使用，如果是，則不執行任何操作
            if (wordElement.classList.contains('used')) {
                return;
            }
            speakWord(wordElement.dataset.word || wordElement.textContent);
            selectWord(wordElement);
        }

        function selectWord(wordElement) {
            if (selectedWord) {
                selectedWord.classList.remove('selected');
            }
            if (selectedWord === wordElement) {
                selectedWord = null;
            } else {
                selectedWord = wordElement;
                selectedWord.classList.add('selected');
            }
        }

        function matchWord(targetElement) {
            if (selectedWord) {
                handleAction(targetElement, selectedWord.dataset.word);
            }
        }

        function handleAction(targetElement, word) {
            const actualTarget = targetElement.closest('.target');
            if (!actualTarget) return;

            const movedWordDiv = actualTarget.querySelector('.moved-word');
            const oldWord = actualTarget.dataset.droppedWord || null;

            actionHistory.push({ target: actualTarget, oldWord: oldWord, newWord: word });

            if (oldWord && oldWord !== word) {
                markUnfamiliarForTarget(actualTarget, oldWord);
            }

            if (oldWord) {
                enableWord(oldWord);
            }
            movedWordDiv.textContent = word;
            disableWord(word);

            actualTarget.dataset.droppedWord = word;
            toggleDeleteButton(actualTarget);

            recordMatchTime(word);

            if (selectedWord) {
                selectedWord.classList.remove('selected');
                selectedWord = null;
            }
        }

        function toggleDeleteButton(targetElement) {
            const deleteButton = targetElement.querySelector('.delete-btn');
            if (targetElement.dataset.droppedWord) {
                targetElement.classList.add('has-word');
            } else {
                targetElement.classList.remove('has-word');
            }
        }

        function undoLastAction() {
            if (actionHistory.length === 0) return;
            const lastAction = actionHistory.pop();
            const { target, oldWord, newWord } = lastAction;

            const movedWordDiv = target.querySelector('.moved-word');
            if (newWord) {
                enableWord(newWord);
            }
            if (oldWord) {
                disableWord(oldWord);
                target.dataset.droppedWord = oldWord;
                movedWordDiv.textContent = oldWord;
            } else {
                delete target.dataset.droppedWord;
                movedWordDiv.textContent = "";
            }
            toggleDeleteButton(target);
        }

        function enableWord(word) {
            const wordDiv = document.querySelector(`.word[data-word="${word}"]`);
            if (wordDiv) {
                wordDiv.classList.remove('used');
                wordDiv.classList.remove('paired');
                wordDiv.draggable = true;
            }
        }

        function disableWord(word) {
            const wordDiv = document.querySelector(`.word[data-word="${word}"]`);
            if (wordDiv) {
                wordDiv.classList.add('used');
                wordDiv.classList.add('paired');
                wordDiv.draggable = false;
            }
        }

        function deleteWord(event, button) {
            event.stopPropagation();
            const target = button.closest('.target');
            const currentWord = target.dataset.droppedWord;
            if (currentWord) {
                markUnfamiliarForTarget(target, currentWord);
                enableWord(currentWord);
            }
            delete target.dataset.droppedWord;
            target.querySelector('.moved-word').textContent = "";
            toggleDeleteButton(target);
        }

        function resetGameUI() {
            document.querySelectorAll('.target').forEach(target => {
                target.querySelector('.moved-word').textContent = "";
                delete target.dataset.droppedWord;
                target.classList.remove('correct', 'incorrect');
                toggleDeleteButton(target);
                target.addEventListener('dragover', allowDrop);
                target.addEventListener('drop', drop);
                target.addEventListener('click', () => matchWord(target));
            });
            document.querySelectorAll('.word').forEach(word => {
                word.classList.remove('used');
                word.draggable = true;
            });

            document.getElementById('result').style.display = 'none';
            document.getElementById('answers').style.display = 'none';

            document.getElementById('submit-btn').disabled = false;
            document.getElementById('undo-btn').style.display = 'inline-block';
            document.getElementById('dark-mode-btn').style.display = 'inline-block';
            document.getElementById('wordbank-btn').style.display = 'inline-block';
            document.querySelector('button[onclick="switchLanguage(\'zh\')"]').style.display = (currentLanguage === 'zh' ? 'none' : 'inline-block');
            document.querySelector('button[onclick="switchLanguage(\'en\')"]').style.display = (currentLanguage === 'en' ? 'none' : 'inline-block');

            document.getElementById('restart-btn').style.display = 'none';
        }


        function checkAnswers() {
            const { meta, stats } = readMetaStatsWithMigration();
            statsMap = stats || {};
            let words = mergeMetaAndStats(meta, statsMap);

            const targetElements = document.querySelectorAll('.target');
            const requiredTargets = Array.from(targetElements).filter(target => target.dataset.required === 'true');
            const unfilledTargets = requiredTargets.filter(target => !target.dataset.droppedWord);

            if (unfilledTargets.length > 0) {
                const t = translations[currentLanguage];
                const confirmMessage = t.confirmSubmitPartial.replace('{count}', unfilledTargets.length);
                if (!confirm(confirmMessage)) {
                    return;
                }
            }

            const correctAnswers = [];
            const wrongAnswers = [];

            targetElements.forEach(target => {
                const droppedWord = target.dataset.droppedWord;
                const originalTranslation = target.dataset.translation;
                target.classList.remove('correct', 'incorrect');

                if (!target.dataset.required || target.dataset.required === 'false') {
                    // 多出來的卡片不列入計分或錯誤
                    return;
                }

                if (droppedWord) {
                    const originalWordIndex = words.findIndex(w => w.word === droppedWord);

                    if (originalWordIndex !== -1) {
                        const originalWordObj = words[originalWordIndex];
                        if (!statsMap[originalWordObj.word]) statsMap[originalWordObj.word] = {};
                        const stat = statsMap[originalWordObj.word];
                        if (originalWordObj.translation === originalTranslation) {
                            target.classList.add('correct');
                            correctAnswers.push(droppedWord);
                            stat.correctCount = (stat.correctCount || 0) + 1;
                            stat.streakCount = (stat.streakCount || 0) + 1;
                            stat.wrongCount = Math.max(0, (stat.wrongCount || 0) - 1);
                            originalWordObj.correctCount = stat.correctCount;
                            originalWordObj.streakCount = stat.streakCount;
                            originalWordObj.wrongCount = stat.wrongCount;

                            const points = calculateWordScore(originalWordObj, true);
                            stat.score = Math.max(0, (stat.score || 0) + points);
                            originalWordObj.score = stat.score;
                        } else {
                            target.classList.add('incorrect');
                            wrongAnswers.push(droppedWord);
                            stat.wrongCount = (stat.wrongCount || 0) + 1;
                            stat.streakCount = 0;
                            originalWordObj.wrongCount = stat.wrongCount;
                            originalWordObj.streakCount = stat.streakCount;

                            const points = calculateWordScore(originalWordObj, false);
                            stat.score = Math.max(0, (stat.score || 0) + points);
                            originalWordObj.score = stat.score;
                        }
                    }
                } else {
                    target.classList.add('incorrect');
                }
            });

            document.querySelectorAll('.word:not(.used)').forEach(wordDiv => {
                const word = wordDiv.dataset.word;
                const originalWordIndex = words.findIndex(w => w.word === word);
                if (originalWordIndex !== -1) {
                    const wordObj = words[originalWordIndex];
                    if (!statsMap[wordObj.word]) statsMap[wordObj.word] = {};
                    const stat = statsMap[wordObj.word];
                    stat.wrongCount = (stat.wrongCount || 0) + 1;
                    stat.streakCount = 0;
                    stat.score = Math.max(0, (stat.score || 0) - 10);
                    wordObj.wrongCount = stat.wrongCount;
                    wordObj.streakCount = stat.streakCount;
                    wordObj.score = stat.score;
                }
            });

            if (!timeTrackingInvalid) {
                Object.keys(pendingTimeStats).forEach(word => {
                    if (!statsMap[word]) statsMap[word] = {};
                    statsMap[word].timeUnits = (statsMap[word].timeUnits || 0) + (pendingTimeStats[word].timeUnits || 0);
                    statsMap[word].timeSamples = (statsMap[word].timeSamples || 0) + (pendingTimeStats[word].timeSamples || 0);
                });
            }
            pendingTimeStats = {};

            saveStats(statsMap);
            localStorage.setItem('wordCardUpdated', Date.now().toString());

            const resultDiv = document.getElementById('result');
            const answersDiv = document.getElementById('answers');
            const restartBtn = document.getElementById('restart-btn');

            resultDiv.style.display = 'block';
            answersDiv.style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';

            document.querySelectorAll('.word').forEach(wordDiv => {
                wordDiv.draggable = false;
                wordDiv.classList.add('used');
                wordDiv.classList.remove('paired');
            });
            document.querySelectorAll('.target').forEach(targetDiv => {
                targetDiv.removeEventListener('drop', drop);
                targetDiv.removeEventListener('dragover', allowDrop);
                targetDiv.removeEventListener('click', matchWord);
                targetDiv.querySelector('.delete-btn').style.display = 'none';
            });

            if (isFirstRound) {
                document.getElementById('wordbank-btn').style.display = 'none';
                isFirstRound = false;
            }

            const t = translations[currentLanguage];
            resultDiv.innerHTML = `<h2>${correctAnswers.length} ${t.correct}, ${wrongAnswers.length + unfilledTargets.length} ${t.incorrect}.</h2>`;

            let answersHTML = '';
            if (wrongAnswers.length > 0 || unfilledTargets.length > 0) {
                answersHTML += `<p><b>${t.correctAnswersTitle}</b></p>`;

                if (wrongAnswers.length > 0) {
                    answersHTML += `<h4>${t.incorrectlyAnsweredTitle}</h4><ul>`;
                    wrongAnswers.forEach(word => {
                        const correctTranslation = words.find(w => w.word === word)?.translation;
                        const wrongTarget = Array.from(targetElements).find(t => t.dataset.droppedWord === word);
                        const userChoiceTranslation = wrongTarget.dataset.translation;

                        answersHTML += `<li><b>${word}</b> &rarr; <s>${userChoiceTranslation}</s> (${t.correctShouldBe}: ${correctTranslation})</li>`;
                    });
                    answersHTML += '</ul>';
                }

                if (unfilledTargets.length > 0) {
                    answersHTML += `<h4>${t.unansweredTitle}</h4><ul>`;
                    unfilledTargets.forEach(target => {
                        const originalTranslation = target.dataset.translation;
                        const correctWord = currentRoundWords.find(w => w.translation === originalTranslation)?.word;
                        if(correctWord) {
                            answersHTML += `<li>${correctWord} : ${originalTranslation}</li>`;
                        }
                    });
                    answersHTML += '</ul>';
                }
            } else {
                answersHTML += `<p>${t.correct === 'correct' ? 'Excellent! All words matched correctly!' : '太棒了！所有單字都答對了！'}</p>`;
            }
            answersDiv.innerHTML = answersHTML;

            restartBtn.style.display = 'inline-block';
            document.getElementById('undo-btn').style.display = 'none';
            document.getElementById('dark-mode-btn').style.display = 'none';
            document.querySelector('button[onclick="switchLanguage(\'zh\')"]').style.display = 'none';
            document.querySelector('button[onclick="switchLanguage(\'en\')"]').style.display = 'none';
        }


        function restartGame() {
            const { meta, stats } = readMetaStatsWithMigration();
            statsMap = stats || {};
            meta.forEach(m => {
                if (!statsMap[m.word]) statsMap[m.word] = {};
                statsMap[m.word].hasBeenTested = false;
            });
            saveStats(statsMap);
            wordsTestedInSession.clear();

            resetGameUI();
            createGame();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);

            const rulesIframe = document.getElementById('rulesModal').querySelector('iframe');
            if (rulesIframe && rulesIframe.contentWindow) {
                rulesIframe.contentWindow.postMessage({ type: 'darkModeChange', isDark: isDark }, '*');
            }
        }

        function openWordBank() {
            window.open('單字庫.html', '_blank');
        }

        function toggleRules() {
            const modal = document.getElementById('rulesModal');
            modal.style.display = 'block';

            const rulesIframe = document.getElementById('rulesModal').querySelector('iframe');
            if (rulesIframe && rulesIframe.contentWindow) {
                const currentLang = localStorage.getItem('currentLanguage') || 'zh';
                const isDark = localStorage.getItem('darkMode') === 'true';

                rulesIframe.contentWindow.postMessage({ type: 'languageChange', lang: currentLang }, '*');
                rulesIframe.contentWindow.postMessage({ type: 'darkModeChange', isDark: isDark }, '*');
            }
        }

        function closeRules(event) {
            const modal = document.getElementById('rulesModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                const modal = document.getElementById('rulesModal');
                if (modal.style.display === 'block') {
                    modal.style.display = 'none';
                }
            }
        });

        window.addEventListener('message', function(event) {
            if (event.data.type === 'wordsUpdated') {
                createGame();
            }
        });

        window.addEventListener('storage', function(event) {
            if (event.key === 'wordBankUpdated') {
                settings = loadGameSettings();
                createGame();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            currentLanguage = localStorage.getItem('currentLanguage') || 'zh';
            switchLanguage(currentLanguage);

            const isDarkMode = localStorage.getItem('darkMode') === 'true';
            if (isDarkMode) {
                document.body.classList.add('dark-mode');
            }
            settings = loadGameSettings();

            const rateInput = document.getElementById('speechRate');
            const volInput = document.getElementById('speechVolume');
            const rateLabel = document.getElementById('speechRateLabel');
            const volLabel = document.getElementById('speechVolumeLabel');
            const voiceSelect = document.getElementById('speechVoice');
            const updateLabels = () => {
                if (rateLabel) rateLabel.textContent = speechSettings.rate.toFixed(2);
                if (volLabel) volLabel.textContent = speechSettings.volume.toFixed(2);
            };
            const populateVoices = () => {
                if (!voiceSelect || !window.speechSynthesis) return;
                const voices = window.speechSynthesis.getVoices();
                voiceSelect.innerHTML = '';
                const hasGoogle = voices.some(v => /Google/i.test(v.name));
                const hasMicrosoft = voices.some(v => /Microsoft/i.test(v.name));
                if (!hasGoogle && !hasMicrosoft) {
                    const opt = document.createElement('option');
                    opt.value = '';
                    opt.textContent = 'No Google/Microsoft voices';
                    opt.disabled = true;
                    opt.selected = true;
                    voiceSelect.appendChild(opt);
                    return;
                }
                const vendors = [
                    { value: 'google', label: 'Google', available: hasGoogle },
                    { value: 'microsoft', label: 'Microsoft', available: hasMicrosoft }
                ];
                vendors.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.value;
                    opt.textContent = v.label;
                    opt.disabled = !v.available;
                    voiceSelect.appendChild(opt);
                });
                const preferred = speechSettings.voiceVendor || (hasGoogle ? 'google' : 'microsoft');
                voiceSelect.value = preferred;
            };

            if (rateInput && volInput) {
                rateInput.value = speechSettings.rate;
                volInput.value = speechSettings.volume;
                updateLabels();
                rateInput.addEventListener('input', () => {
                    speechSettings.rate = clamp(parseFloat(rateInput.value) || defaultSpeechSettings.rate, 0.5, 2);
                    localStorage.setItem('speechSettings', JSON.stringify(speechSettings));
                    updateLabels();
                });
                volInput.addEventListener('input', () => {
                    speechSettings.volume = clamp(parseFloat(volInput.value) || defaultSpeechSettings.volume, 0, 1);
                    localStorage.setItem('speechSettings', JSON.stringify(speechSettings));
                    updateLabels();
                });
            }
            if (voiceSelect) {
                populateVoices();
                if (window.speechSynthesis) {
                    window.speechSynthesis.onvoiceschanged = populateVoices;
                }
                voiceSelect.addEventListener('change', () => {
                    speechSettings.voiceVendor = voiceSelect.value || 'google';
                    localStorage.setItem('speechSettings', JSON.stringify(speechSettings));
                });
            }

            ['click', 'keydown', 'dragstart', 'drop', 'touchstart'].forEach(evt => {
                document.addEventListener(evt, recordActivity, true);
            });

            createGame();
        });
    </script>
